apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-data-pvc
  namespace: agentic-arxiv
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-reports-pvc
  namespace: agentic-arxiv
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi